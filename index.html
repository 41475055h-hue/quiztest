<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>隨機答題遊戲</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #f5d0fe, #fef3c7);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2937;
    }
    .app {
      width: min(920px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(31, 41, 55, 0.18);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.75);
    }
    header {
      padding: 30px 34px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 44px);
      letter-spacing: 1px;
    }
    .subtitle {
      margin: 0;
      opacity: 0.92;
      font-size: 16px;
    }
    main { padding: 28px 34px 34px; }
    .top-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 22px;
    }
    label {
      display: block;
      font-weight: 800;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      font-size: 17px;
      background: white;
      outline: none;
    }
    select:focus { border-color: #6366f1; }
    .score-box {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 800;
      background: #f3f4f6;
      white-space: nowrap;
    }
    .pill.good { color: #047857; background: #d1fae5; }
    .pill.bad { color: #b91c1c; background: #fee2e2; }
    .card {
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 24px;
      padding: 24px;
      min-height: 320px;
    }
    .question-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .question {
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.45;
      margin: 0 0 22px;
      font-weight: 900;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .option-btn {
      width: 100%;
      text-align: left;
      border: 2px solid #dbeafe;
      background: #eff6ff;
      padding: 16px 18px;
      border-radius: 18px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.15s;
      line-height: 1.35;
      color: #1e3a8a;
      font-weight: 750;
    }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: #3b82f6;
      box-shadow: 0 10px 20px rgba(59, 130, 246, 0.16);
    }
    .option-btn:disabled { cursor: not-allowed; opacity: 0.85; }
    .option-btn.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #14532d;
    }
    .option-btn.wrong {
      background: #fee2e2;
      border-color: #dc2626;
      color: #7f1d1d;
    }
    .result {
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 18px;
      font-weight: 900;
      display: none;
      line-height: 1.5;
    }
    .result.show { display: block; }
    .result.correct { background: #d1fae5; color: #065f46; }
    .result.wrong { background: #fee2e2; color: #991b1b; }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }
    .main-btn, .secondary-btn {
      border: 0;
      padding: 14px 20px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }
    .main-btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.28);
    }
    .secondary-btn { background: #f3f4f6; color: #374151; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      font-weight: 800;
      font-size: 20px;
    }
    @media (max-width: 700px) {
      main { padding: 22px; }
      header { padding: 24px; }
      .top-row { grid-template-columns: 1fr; }
      .score-box { justify-content: flex-start; }
      .options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>隨機答題遊戲</h1>
      <p class="subtitle">選擇難度後，系統會從該難度題庫隨機抽一題。</p>
    </header>

    <main>
      <div class="top-row">
        <div>
          <label for="levelSelect">選擇難度</label>

            <option value="2">等級 2</option>
            <option value="3">等級 3</option>
            <option value="4">等級 4</option>
            <option value="5">等級 5</option>
          </select>
        </div>
        <div class="score-box">
          <span class="pill good">答對：<span id="correctCount">0</span></span>
          <span class="pill bad">答錯：<span id="wrongCount">0</span></span>
          <span class="pill">目前題數：<span id="questionCount">0</span></span>
        </div>
      </div>

      <section class="card" id="quizCard"></section>

      <div class="actions">
        <button class="main-btn" id="nextBtn">抽下一題</button>
        <button class="secondary-btn" id="resetBtn">重置分數</button>
      </div>
    </main>
  </div>

    const quizCard = document.getElementById("quizCard");
    const levelSelect = document.getElementById("levelSelect");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");
    const correctCountEl = document.getElementById("correctCount");
    const wrongCountEl = document.getElementById("wrongCount");
    const questionCountEl = document.getElementById("questionCount");

    let currentQuestion = null;
    let currentIndex = -1;
    let correctCount = 0;
    let wrongCount = 0;
    let questionCount = 0;

    function updateScore() {
      correctCountEl.textContent = correctCount;
      wrongCountEl.textContent = wrongCount;
      questionCountEl.textContent = questionCount;
    }

    function getRandomQuestion(level) {
      const questions = questionBank[level] || [];
      if (questions.length === 0) return null;
      let randomIndex = Math.floor(Math.random() * questions.length);
      if (questions.length > 1) {
        while (randomIndex === currentIndex) {
          randomIndex = Math.floor(Math.random() * questions.length);
        }
      }
      currentIndex = randomIndex;
      return questions[randomIndex];
    }

    function renderQuestion() {
      const level = levelSelect.value;
      const questions = questionBank[level] || [];
      currentQuestion = getRandomQuestion(level);

      if (!currentQuestion) {
        quizCard.innerHTML = `
          <div class="empty">
            等級 ${level} 目前還沒有題目。<br />
            之後把題庫貼進來，就可以加到這個難度。
          </div>
        `;
        return;
      }

      questionCount++;
      updateScore();

      const optionHtml = Object.entries(currentQuestion.options).map(([key, value]) => `
        <button class="option-btn" data-option="${key}">
          ${key}. ${value}
        </button>
      `).join("");

      quizCard.innerHTML = `
        <div class="question-meta">
          <span>難度：等級 ${level}</span>
          <span>此難度題庫：${questions.length} 題</span>
        </div>
        <p class="question">${currentQuestion.q}</p>
        <div class="options">${optionHtml}</div>
        <div class="result" id="resultBox"></div>
      `;

      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => checkAnswer(btn));
      });
    }

    function checkAnswer(selectedBtn) {
      const selected = selectedBtn.dataset.option;
      const answer = currentQuestion.answer;
      const resultBox = document.getElementById("resultBox");
      const allButtons = document.querySelectorAll(".option-btn");

      allButtons.forEach(btn => btn.disabled = true);

      if (!answer) {
        resultBox.className = "result wrong show";
        resultBox.textContent = "這題還沒有設定正確答案，請先補上答案。";
        return;
      }

      allButtons.forEach(btn => {
        if (btn.dataset.option === answer) btn.classList.add("correct");
      });

      if (selected === answer) {
        selectedBtn.classList.add("correct");
        resultBox.className = "result correct show";
        resultBox.textContent = "答對了！";
        correctCount++;
      } else {
        selectedBtn.classList.add("wrong");
        resultBox.className = "result wrong show";
        resultBox.textContent = `答錯了，正確答案是 ${answer}. ${currentQuestion.options[answer]}`;
        wrongCount++;
      }

      updateScore();
    }

    nextBtn.addEventListener("click", renderQuestion);
    levelSelect.addEventListener("change", () => {
      currentIndex = -1;
      renderQuestion();
    });
    resetBtn.addEventListener("click", () => {
      correctCount = 0;
      wrongCount = 0;
      questionCount = 0;
      updateScore();
      renderQuestion();
    });

    renderQuestion();
  </script>
