let currentLevel = "Lv.1";
let currentQuestion = null;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function setupLevels(){
  const row = document.getElementById("levelRow");
  Object.keys(questionBank).forEach(level=>{
    const btn = document.createElement("button");
    btn.textContent = level;
    btn.className = "level-btn";
    btn.id = "btn-" + level;
    btn.onclick = () => selectLevel(level);
    row.appendChild(btn);
  });
  selectLevel(currentLevel);
}

function selectLevel(level){
  currentLevel = level;
  currentQuestion = null;
  answered = false;
  document.querySelectorAll(".level-btn").forEach(btn=>btn.classList.remove("active"));
  document.getElementById("btn-" + level).classList.add("active");
  document.getElementById("questionNumber").textContent = "目前等級：" + level + "，尚未抽題";
  document.getElementById("questionText").textContent = "請按下「隨機抽題」。";
  document.getElementById("result").textContent = "";
  ["A","B","C","D"].forEach(letter=>{
    const btn = document.getElementById(letter);
    btn.textContent = letter + ".";
    btn.className = "choice";
    btn.disabled = false;
  });
}

function drawQuestion(){
  const list = questionBank[currentLevel];
  const index = Math.floor(Math.random() * list.length);
  currentQuestion = list[index];
  answered = false;
  document.getElementById("questionNumber").textContent = "目前等級：" + currentLevel + "｜第 " + (index+1) + " 題 / 共 " + list.length + " 題";
  document.getElementById("questionText").textContent = currentQuestion.question;
  document.getElementById("result").textContent = "";
  ["A","B","C","D"].forEach(letter=>{
    const btn = document.getElementById(letter);
    btn.textContent = letter + ". " + currentQuestion.choices[letter];
    btn.className = "choice";
    btn.disabled = false;
  });
}

function checkAnswer(choice){
  if(!currentQuestion){
    document.getElementById("result").textContent = "請先抽題！";
    document.getElementById("result").style.color = "#991b1b";
    return;
  }
  if(answered) return;
  answered = true;
  const correct = currentQuestion.answer;
  ["A","B","C","D"].forEach(letter=>{
    const btn=document.getElementById(letter);
    btn.disabled=true;
    if(correct && letter===correct) btn.classList.add("correct");
  });
  if(!correct){
    document.getElementById("result").textContent = "這題尚未設定標準答案，請之後補上正確選項。";
    document.getElementById("result").style.color = "#92400e";
    return;
  }
  if(choice === correct){
    correctCount++;
    document.getElementById(choice).classList.add("correct");
    document.getElementById("result").textContent = "答對！";
    document.getElementById("result").style.color = "#166534";
  }else{
    wrongCount++;
    document.getElementById(choice).classList.add("wrong");
    document.getElementById("result").textContent = "答錯！正確答案是 " + correct;
    document.getElementById("result").style.color = "#991b1b";
  }
  updateScore();
}

function updateScore(){
  document.getElementById("score").textContent = "答對：" + correctCount + "　答錯：" + wrongCount;
}
function resetScore(){
  correctCount = 0;
  wrongCount = 0;
  updateScore();
  document.getElementById("result").textContent = "";
}
setupLevels();
